{% extends "base.html" %}
{% block content %}
<style>
    /* Ensure the page takes up the full screen */
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }

    .auth-wrapper {
        display: flex;
        height: 100vh;
        width: 100vw;
        /* Replace the URL below with your actual background image path */
        background-image: url('{{ url_for("static", filename="images/campus_bg.jpg") }}');
        background-size: cover;
        background-position: center;
    }

    /* The Dark Blurred Sidebar */
    .auth-content {
        width: 33%; /* Adjust width to match image */
        min-width: 380px;
        background: rgba(10, 25, 41, 0.85); /* Deep navy with transparency */
        backdrop-filter: blur(15px); /* This creates the effect from the image */
        -webkit-backdrop-filter: blur(15px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 50px;
        color: white;
        z-index: 10;
    }

    .auth-content h1 {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 2rem;
        color: #ffffff;
    }

    /* Form Layout */
    form {
        display: flex;
        flex-direction: column;
    }

    .input-group {
        margin-bottom: 1.5rem;
    }

    .input-group label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 8px;
        color: #d1d1d1;
    }

    input[type="email"], 
    input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: white;
        font-size: 1rem;
        box-sizing: border-box;
    }

    /* Remember Me & Forgot Password Row */
    .form-extras {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
    }

    .form-extras label {
        display: flex;
        align-items: center;
        cursor: pointer;
    }

    .form-extras input {
        margin-right: 8px;
    }

    .form-extras a {
        color: #5da5ff;
        text-decoration: none;
    }

    /* Blue Login Button */
    .login-btn {
        background-color: #1a64a4; /* The specific blue from the image */
        color: white;
        padding: 12px;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .login-btn:hover {
        background-color: #145288;
    }

    .footer-note {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #b0b0b0;
        line-height: 1.4;
    }

    .footer-note a {
        color: #5da5ff;
        text-decoration: none;
    }

    /* Right side is just empty to show the background */
    .auth-image-space {
        flex-grow: 1;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-content">
        <h1>Login</h1>
        
        <form method="post">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Username" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="form-extras">
                <label>
                    <input type="checkbox" name="remember"> Remember Me
                </label>
                <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer-note">
            New user? <a href="{{ url_for('register') }}">Register here</a><br>
            (Email verification with OTP required)
        </div>
    </div>

    <div class="auth-image-space">
        </div>
</div>
{% endblock %}
