{% extends "base.html" %}
{% block content %}

<div class="login-layout">
  
  <div class="login-left">
    <h1>Campus Placement<br>Portal</h1>
    
    <div class="icon-placeholder">🎓 📈</div>
    
    <p>Good Morning, Campus Professional.<br>Ready to find your dream role?</p>
  </div>

  <div class="login-right">
    <form method="post">
      
      <div class="form-group">
        <label>Campus ID</label>
        <input type="text" name="campus_id" placeholder="Campus ID (Optional)">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="manasviahuja21@gmail.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••••••" required>
      </div>

      <div class="form-options">
        <label>
          <input type="checkbox" name="remember">
          Remember Me
        </label>
        <a href="{{ url_for('forgot_password') }}" style="color: var(--primary-glow); text-decoration: none;">Forgot password?</a>
      </div>

      <button type="submit">Login</button>
      
    </form>
    
    <div class="auth-links">
      <p>New user? <a href="{{ url_for('register') }}">Register here</a></p>
      <p style="font-size: 0.8rem; margin-top: 6px; opacity: 0.7;">(Email verification with OTP required)</p>
    </div>
  </div>

</div>

{% endblock %}
